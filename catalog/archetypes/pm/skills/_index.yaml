    description: "將 validated OPP 移入 backlog 並補齊評分欄位"
    mode: hybrid
    estimated_effort: medium
    phase: 2
    path: ".github/skills/pm-move-opp-exp-to-backlog/SKILL.md"

  - name: "Backlog 移交工程"
    alias: "pm-move-backlog-to-handoff"
    trigger: "當 backlog ready 要移交工程時"
    description: "建立 Product Brief 並完成 handoff"
    mode: hybrid
    estimated_effort: medium
    phase: 3
    path: ".github/skills/pm-move-backlog-to-handoff/SKILL.md"
