# _registry.yaml — 協作參與者註冊表
# 每個加入協作的角色 Repo 在此登記
# 用途：讓任何角色快速查到「誰能幫我做什麼」

schema_version: "1.0"
last_updated: "2026-03-04"

# ============================================================
# 協作角色清單（包含本 Repo 與示範角色）
# ============================================================

participants:
  - alias: "role-foundry"
    name: "角色鍛造師"
    icon: "🔨"
    repo_path: "."
    exports_ref: ".ai/interfaces/exports.yaml"
    status: active
    can_handle:
      - alias: "role-bootstrap"
        description: "引導建立新角色 Repo 的完整流程"
      - alias: "repo-healthcheck"
        description: "產出 5 維度結構化健康報告"
      - alias: "interface-wiring"
        description: "建立跨 Repo exports/imports 與 lite 注入"
    preferred_collab_style: "先定義框架邊界，再給可執行步驟"

  - alias: "architect"
    name: "架構師"
    icon: "🏗️"
    repo_path: "../architect-expert"
    exports_ref: ".ai/interfaces/exports.yaml"
    status: active                    # active | inactive | deprecated
    can_handle:
      - alias: "arch-review"
        description: "從擴展性、一致性、維護成本審查技術方案"
      - alias: "tech-selection"
        description: "產出結構化 Trade-off 分析報告"
      - alias: "adr-write"
        description: "撰寫 Architecture Decision Record"
    preferred_collab_style: "先給結論再展開推理"

  - alias: "pm"
    name: "產品經理"
    icon: "📋"
    repo_path: "../pm-expert"
    exports_ref: ".ai/interfaces/exports.yaml"
    status: active
    can_handle:
      - alias: "prd-write"
        description: "撰寫 Product Requirements Document"
      - alias: "story-breakdown"
        description: "將 PRD 拆解為 User Stories + Acceptance Criteria"
      - alias: "priority-analysis"
        description: "需求衝突時產出優先順序矩陣"
    preferred_collab_style: "使用者視角優先，搭配業務指標佐證"

  - alias: "qa"
    name: "品質工程師"
    icon: "🧪"
    repo_path: "../qa-expert"
    exports_ref: ".ai/interfaces/exports.yaml"
    status: active
    can_handle:
      - alias: "test-strategy"
        description: "制定測試策略文件"
      - alias: "test-case-gen"
        description: "從 User Story 產出測試案例（含邊界條件）"
      - alias: "bug-analysis"
        description: "根因分析 + 重現步驟 + 修復建議"
    preferred_collab_style: "提供具體場景和數據，避免抽象描述"
